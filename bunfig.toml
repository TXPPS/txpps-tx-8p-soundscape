[install]
saveTextLockfile = true
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm before adding any.
# The framework build preset is the only package that needs it.
minimumReleaseAgeExcludes = ["@lovable.dev/vite-tanstack-config"]
